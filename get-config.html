<!DOCTYPE html>
<html lang="en">
<head>
  <title>Dire Wolf Config | TO's APRS Tools</title>
  <meta name="description" content="Copy-ready Dire Wolf configuration for APRS stations, with selectable presets as the state of the art evolves."/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
:root {
  --bg: #0b0f14;
  --panel: #121821;
  --panel2: #192331;
  --line: #263244;
  --text: #e8eef7;
  --muted: #a7b3c2;
  --accent: #59d18c;
  --radius: 16px;
  --shadow: 0 10px 24px rgba(0,0,0,.22);
}
* { box-sizing: border-box; }
html, body {
  margin:0; padding:0;
  background:var(--bg); color:var(--text);
  font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}
body { padding:24px; }
.wrap { max-width: 1320px; margin:0 auto; }

.logo {
  display:flex;
  justify-content:center;
  margin-bottom:16px;
}
.logo img {
  max-width:100%;
  height:auto;
}

.hero {
  background: linear-gradient(180deg, rgba(89,209,140,.08), rgba(89,209,140,0) 40%), var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 18px;
}
h1 { margin:0 0 8px; font-size: clamp(28px,4vw,42px); line-height:1.05; }
.sub { margin:0; color:var(--muted); max-width: 78ch; }

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
}

.toolbar {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}

.toolbar-left {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
}

.label {
  font-size:13px;
  color:var(--muted);
}

select,
button {
  appearance:none;
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font:inherit;
}

select {
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  min-width:220px;
  cursor:pointer;
}

button {
  cursor:pointer;
  background:var(--accent);
  color:#08110c;
  font-weight:700;
}

button:hover,
select:hover {
  filter: brightness(1.05);
}

textarea {
  width:100%;
  min-height: 720px;
  resize: vertical;
  background:#0d131d;
  color:var(--text);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
}

.note {
  margin-top: 14px;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 560px) {
  body { padding:16px; }
  textarea { min-height: 560px; }
  .toolbar { align-items:stretch; }
  .toolbar-left,
  .toolbar { flex-direction:column; }
  select,
  button { width:100%; }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo" style="display:flex; align-items:center; justify-content:center; gap:20px;">
      <a href="https://temporarilyoffline.com">
        <img src="https://temporarilyoffline.com/cdn/shop/files/TOADs_DI_Front.png?v=1754430761&height=96" alt="Get Your Radio Connected!" style="height:96px;">
      </a>

      <img src="https://temporarilyoffline.com/cdn/shop/files/TOLogo3kBlack.png?height=96&v=1757190515" alt="Temporarily Offline" style="height:96px;">

      <a href="https://temporarilyoffline.com">
        <img src="https://temporarilyoffline.com/cdn/shop/files/AIOCTransparentModel.png?v=1766529563&height=96" alt="Get Your Radio Connected!" style="height:96px;">
      </a>
    </div>

    <section class="hero">
      <h1>Dire Wolf Config</h1>
      <p class="sub">Copy-ready APRS configuration snippets and helper files. Pick a profile from the dropdown, then copy and customize it before putting it on the air.</p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="label">Select station profile</div>
          <select id="configSelect" aria-label="Select Dire Wolf configuration profile">
            <option value="fill-in-digi" selected>Fill In Digi</option>
            <option value="systemd">systemd config</option>
          </select>
        </div>
        <button id="copyBtn" type="button">Copy to Clipboard</button>
      </div>

      <textarea id="confBox" spellcheck="false">#############################################################
# Dire Wolf - APRS Fill-In Digipeater + IGate
#############################################################

MYCALL T0ADS-1
ADEVICE plughw:CARD=Device,DEV=0
PTT CM108
MODEM 1200
AGWPORT 8000
KISSPORT 8001
LOGDIR /var/log/direwolf

#############################################################
# DIGIPEATER - fill-in digi only
# Respond only to WIDE1-1 requests.
#############################################################

DIGIPEAT 0 0 ^WIDE1-1$ ^WIDE1-1$

#############################################################
# IGATE - RF <-> APRS-IS
#############################################################

IGSERVER noam.aprs2.net
# Visit http://aprs-tools.temporarilyoffline.com for passcode
IGLOGIN T0ADS-1 13718

# One hop max from Internet back to RF.
# Good sane default for a bidirectional IGate.
IGTXVIA 0 WIDE1-1

# Reasonable local-area server-side filter.
IGFILTER m/50

# Keep RF gating under control.
IGTXLIMIT 10 5

#############################################################
# FIXED STATION BEACON - use this OR GPS below, not both
#############################################################

# Replace lat/long/comment with your real values.
# "digi" is a sensible symbol for infrastructure here.

# Visit http://aprs-tools.temporarilyoffline.com for passcode
# PBEACON delay=1:00 every=10:00 symbol="digi" lat=32^06.7N long=110^48.9W comment="T0ADs fill-in digi + IGate"

#############################################################
# GPS / TRACKER - use this OR PBEACON above, not both
#############################################################

# GPSD example
# GPS
# TBEACON sendto=0 delay=0:30 every=10:00 symbol="digi" comment="T0ADs fill-in digi + IGate" AMBIGUITY=1

# Internet-only position example
# TBEACON sendto=IG delay=0:45 every=10:00 symbol="digi" comment="T0ADs fill-in digi + IGate" AMBIGUITY=1

# SMARTBEACONING 5 30 1 30 180 255</textarea>

      <div class="note" id="statusNote">Loaded profile: Fill In Digi.</div>
    </section>
  </div>

  <script>
    const CONFIGS = {
      "fill-in-digi": `#############################################################
# Dire Wolf - APRS Fill-In Digipeater + IGate
#############################################################

MYCALL T0ADS-1
ADEVICE plughw:CARD=Device,DEV=0
PTT CM108
MODEM 1200
AGWPORT 8000
KISSPORT 8001
LOGDIR /var/log/direwolf

#############################################################
# DIGIPEATER - fill-in digi only
# Respond only to WIDE1-1 requests.
#############################################################

DIGIPEAT 0 0 ^WIDE1-1$ ^WIDE1-1$

#############################################################
# IGATE - RF <-> APRS-IS
#############################################################

IGSERVER noam.aprs2.net
# Visit http://aprs-tools.temporarilyoffline.com for passcode
IGLOGIN T0ADS-1 13718

# One hop max from Internet back to RF.
# Good sane default for a bidirectional IGate.
IGTXVIA 0 WIDE1-1

# Reasonable local-area server-side filter.
IGFILTER m/50

# Keep RF gating under control.
IGTXLIMIT 10 5

#############################################################
# FIXED STATION BEACON - use this OR GPS below, not both
#############################################################

# Replace lat/long/comment with your real values.
# "digi" is a sensible symbol for infrastructure here.

# Visit http://aprs-tools.temporarilyoffline.com for passcode
PBEACON delay=1:00 every=10:00 symbol="digi" lat=32^06.7N long=110^48.9W comment="T0ADs fill-in digi + IGate"

#############################################################
# GPS / TRACKER - use this OR PBEACON above, not both
#############################################################

# GPSD example
# GPSD
# TBEACON sendto=0 delay=0:30 every=10:00 symbol="digi" comment="T0ADs fill-in digi + IGate" AMBIGUITY=1

# Internet-only position example
# TBEACON sendto=IG delay=0:45 every=10:00 symbol="digi" comment="T0ADs fill-in digi + IGate" AMBIGUITY=1

# SMARTBEACONING 5 30 1 30 180 255`,

      "systemd": `[Unit]
Description=Direwolf APRS TNC
After=network.target sound.target gpsd.service

[Service]
ExecStart=/usr/bin/direwolf -c /etc/direwolf.conf -t 0
Restart=always
User=direwolf
Group=direwolf

# Optional but nice:
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target`
    };

    const configSelect = document.getElementById('configSelect');
    const copyBtn = document.getElementById('copyBtn');
    const confBox = document.getElementById('confBox');
    const statusNote = document.getElementById('statusNote');

    function loadConfig() {
      const selected = configSelect.value;
      confBox.value = CONFIGS[selected] || '';
      const selectedText = configSelect.options[configSelect.selectedIndex]?.text || 'Config';
      statusNote.textContent = `Loaded profile: ${selectedText}.`;
    }

    configSelect.addEventListener('change', loadConfig);

    copyBtn.addEventListener('click', async () => {
      try {
        confBox.select();
        confBox.setSelectionRange(0, confBox.value.length);
        await navigator.clipboard.writeText(confBox.value);
        const selectedText = configSelect.options[configSelect.selectedIndex]?.text || 'config';
        statusNote.textContent = `Copied ${selectedText} to clipboard.`;
      } catch (err) {
        try {
          confBox.select();
          document.execCommand('copy');
          const selectedText = configSelect.options[configSelect.selectedIndex]?.text || 'config';
          statusNote.textContent = `Copied ${selectedText} to clipboard.`;
        } catch (fallbackErr) {
          statusNote.textContent = 'Copy failed. You can still manually select and copy the text.';
        }
      }
    });

    loadConfig();
  </script>
</body>
</html>
